services:
  - type: web
    name: aria-voice-scheduler
    env: node
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_REDIRECT_URI
        fromService:
          type: web
          name: aria-voice-scheduler
          property: host
          # Will be auto-set to: https://aria-voice-scheduler.onrender.com/auth/callback
